name: Scheduled Pipeline Trigger

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: newsroom-scheduled-run
  cancel-in-progress: false

jobs:
  run-newsroom:
    runs-on: ubuntu-latest
    steps:
      - name: Healthcheck and runtime context
        run: |
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Started at (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run newsroom pipeline
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          CRAWL4AI_API_URL: ${{ secrets.CRAWL4AI_API_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$GOOGLE_GENERATIVE_AI_API_KEY" ] || [ -z "$DEEPGRAM_API_KEY" ] || [ -z "$DATABASE_URL" ]; then
            echo "Missing required secrets. At minimum set GOOGLE_GENERATIVE_AI_API_KEY, DEEPGRAM_API_KEY, and DATABASE_URL."
            exit 1
          fi

          npm run newsroom

      - name: Finish logs
        run: |
          echo "Finished at (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
